<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            cursor: pointer;
        }
        .meme-container {
            position: relative;
            text-align: center;
            margin-top: 50px;
        }
        .meme-caption {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
    </style>
    <title>Mouse Pointer Meme</title>
</head>
<body>
    <div class="meme-container">
        <h1>Hover over this page to see the mouse pointer</h1>
        <div class="meme-caption">When your mouse pointer is more stylish than you</div>
    </div>
</body>
</html>
